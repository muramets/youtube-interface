    /* ==========================================================
     *  CONTEXT BREAKDOWN — chars → tokens scaling
     * ========================================================== */

    /**
     * contextBreakdown stores CHARACTERS, not tokens.
     * This replicates the frontend scaleBreakdown() logic from tokenDisplay.ts:
     * scale = (actualInputTokens - imageTokens) / totalTextChars
     */
    function scaleBreakdown(raw, inputTokens) {
      if (!raw || !inputTokens) return raw;

      /* sum text-based char fields (mirrors tokenDisplay.ts) */
      var textChars = (raw.systemPrompt || 0) + (raw.toolDefinitions || 0) +
        (raw.history || 0) + (raw.historyToolResults || 0) + (raw.memory || 0) +
        (raw.currentMessage || 0) + (raw.toolResults || 0);

      var imageTokens = raw.imageTokens || 0;
      var textBudget = inputTokens - Math.min(imageTokens, inputTokens);
      var scale = textChars > 0 ? textBudget / textChars : 0;

      var scaled = {};
      for (var key in raw) {
        if (!raw.hasOwnProperty(key)) continue;
        var val = raw[key];
        if (key === 'imageTokens') {
          scaled[key] = val; /* already in tokens */
        } else if (key === 'imageCount' || key === 'usedSummary' || key === 'historyMessageCount') {
          scaled[key] = val; /* not chars — keep as-is */
        } else if (typeof val === 'number') {
          scaled[key] = Math.round(val * scale);
        } else if (typeof val === 'object' && val) {
          scaled[key] = {};
          for (var sub in val) {
            if (typeof val[sub] === 'number') scaled[key][sub] = Math.round(val[sub] * scale);
            else scaled[key][sub] = val[sub];
          }
        } else {
          scaled[key] = val;
        }
      }
      return scaled;
    }

    function renderContextBreakdown(breakdown) {
      var container = el('div', { className: 'breakdown-bars' });

      /* flatten into items, but skip systemPrompt if systemLayers exists (avoid double-count) */
      var hasSystemLayers = breakdown.systemLayers && typeof breakdown.systemLayers === 'object';
      var items = [];
      for (var key in breakdown) {
        if (!breakdown.hasOwnProperty(key)) continue;
        if (key === 'systemPrompt' && hasSystemLayers) continue; /* sub-items shown instead */
        if (key === 'imageCount' || key === 'usedSummary' || key === 'historyMessageCount') continue;
        var val = breakdown[key];
        if (typeof val === 'number' && val > 0) {
          items.push({ label: key, tokens: val });
        } else if (typeof val === 'object' && val) {
          for (var sub in val) {
            if (val.hasOwnProperty(sub) && typeof val[sub] === 'number' && val[sub] > 0) {
              items.push({ label: key + '.' + sub, tokens: val[sub] });
            }
          }
        }
      }

      items.sort(function(a, b) { return b.tokens - a.tokens; });
      var maxTokens = (items[0] && items[0].tokens) || 1;

      var colors = ['var(--accent)', 'var(--warning)', 'var(--success)', 'var(--danger)', 'var(--purple)',
        '#f778ba', '#79c0ff', '#56d364', '#e3b341', '#db61a2'];

      items.forEach(function(item, i) {
        var pct = item.tokens / maxTokens * 100;
        container.appendChild(el('div', { className: 'breakdown-row' },
          el('span', { className: 'breakdown-label' }, item.label),
          el('div', { className: 'breakdown-bar-bg' },
            el('div', {
              className: 'breakdown-bar-fill',
              style: { width: pct + '%', background: colors[i % colors.length], opacity: '0.6' }
            }, fmtNum(item.tokens))
          ),
          el('span', { className: 'breakdown-tokens' }, fmtNum(item.tokens))
        ));
      });

      return container;
    }

    /* ==========================================================
     *  META BAR
     * ========================================================== */

    function renderMeta(meta, modelMsg, conversation) {
      var bar = document.getElementById('meta-bar');
      bar.innerHTML = '';

      bar.appendChild(el('span', { className: 'meta-title' }, meta.title || 'Untitled'));

      if (modelMsg && modelMsg.model) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Model '),
          el('span', { className: 'value' }, modelMsg.model)
        ));
      }

      /* aggregate cost across all model messages */
      var totalCost = 0;
      var totalIterations = 0;
      var lastCw = null;
      var messages = document.traceMessages || [];
      messages.forEach(function(m) {
        if (m.role === 'model' && m.normalizedUsage && m.normalizedUsage.billing) {
          var bill = m.normalizedUsage.billing;
          if (bill.cost && bill.cost.total != null) totalCost += bill.cost.total;
          if (bill.iterations) totalIterations += bill.iterations;
        }
        if (m.role === 'model' && m.normalizedUsage && m.normalizedUsage.contextWindow) {
          lastCw = m.normalizedUsage.contextWindow;
        }
      });

      if (totalCost > 0) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Cost '),
          el('span', { className: 'value' }, fmtCost(totalCost))
        ));
      }

      if (totalIterations > 0) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Iter '),
          el('span', { className: 'value' }, String(totalIterations))
        ));
      }

      if (lastCw) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Context '),
          el('span', { className: 'value' }, lastCw.percent + '% of ' + fmtNum(lastCw.limit))
        ));
      }

      if (meta.totalToolCalls) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Tools '),
          el('span', { className: 'value' }, String(meta.totalToolCalls))
        ));
      }

      if (meta.messageCount) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Msgs '),
          el('span', { className: 'value' }, String(meta.messageCount))
        ));
      }

      if (meta.exportedAt) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Exported '),
          el('span', { className: 'value' }, new Date(meta.exportedAt).toLocaleDateString())
        ));
      }

      if (conversation && conversation.createdAt) {
        bar.appendChild(el('span', { className: 'meta-badge' },
          el('span', { className: 'label' }, 'Created '),
          el('span', { className: 'value' }, new Date(conversation.createdAt).toLocaleString())
        ));
      }
    }

    /* ==========================================================
     *  MODEL RESPONSE
     * ========================================================== */

    function renderResponse(text) {
      var panel = document.getElementById('response-panel');

      panel.appendChild(el('div', { className: 'response-label' }, 'Model Response'));

      var content = el('div');
      if (typeof marked !== 'undefined' && marked.parse) {
        content.innerHTML = marked.parse(text || '');
      } else {
        content.appendChild(el('pre', { style: { whiteSpace: 'pre-wrap', color: 'var(--text-secondary)' } }, text || ''));
      }
      panel.appendChild(content);
    }

    /* ==========================================================
     *  GENERIC RENDERER — auto-detects data patterns
     * ========================================================== */

    function renderGenericResult(result, totalTokens) {
      var container = el('div');

      var keys = Object.keys(result);
      var sections = [];
      keys.forEach(function(key) {
        if (result[key] != null) {
          sections.push({ name: key, tokens: estimateTokens(result[key]), data: result[key] });
        }
      });

      /* token budget bar if 2+ sections */
      if (sections.length > 1) {
        container.appendChild(renderTokenBudget(sections));
      }

      /* render each section */
      sections.forEach(function(sec, i) {
        container.appendChild(createSection(sec.name, sec.data, totalTokens, function(body) {
          body.appendChild(renderAutoValue(sec.data));
        }, i < 3));
      });

      return container;
    }

    /** Auto-detect data shape and pick the best renderer */
    function renderAutoValue(value) {
      if (value == null) return el('span', { style: { color: 'var(--text-tertiary)' } }, 'null');

      if (typeof value === 'string') {
        if (value.length > 200) return el('div', { className: 'json-raw' }, value);
        return el('span', { style: { color: 'var(--text-secondary)' } }, value);
      }

      if (typeof value === 'number') {
        return el('span', { style: { fontFamily: 'var(--font-mono)', color: 'var(--accent)' } }, fmtNum(value));
      }

      if (typeof value === 'boolean') {
        return el('span', { style: { fontFamily: 'var(--font-mono)', color: value ? 'var(--success)' : 'var(--danger)' } }, String(value));
      }

      if (Array.isArray(value)) {
        if (value.length === 0) return el('span', { style: { color: 'var(--text-tertiary)' } }, '[ ] (empty)');

        /* [{ something, count }] → bar chart */
        if (isCountArray(value)) return renderCountBars(value);

        /* array of objects → auto-table */
        if (typeof value[0] === 'object' && value[0] !== null && !Array.isArray(value[0])) {
          return renderAutoTable(value);
        }

        /* array of primitives */
        if (value.length <= 20) {
          var pills = el('div', { className: 'tag-pills' });
          value.forEach(function(v) { pills.appendChild(el('span', { className: 'tag-pill' }, String(v))); });
          return pills;
        }
        return el('pre', { className: 'json-raw' }, JSON.stringify(value, null, 2));
      }

      if (typeof value === 'object') {
        return renderAutoObject(value);
      }

      return el('span', {}, String(value));
    }

    /** Detect [{ label, count }] pattern */
    function isCountArray(arr) {
      if (arr.length === 0 || typeof arr[0] !== 'object' || arr[0] === null) return false;
      var keys = Object.keys(arr[0]);
      return keys.length >= 2 && keys.length <= 4 && keys.includes('count');
    }

    /** Render [{ label, count }] as horizontal bar chart */
    function renderCountBars(arr) {
      var labelKey = Object.keys(arr[0]).find(function(k) { return k !== 'count'; });
      var maxCount = Math.max.apply(null, arr.map(function(item) { return item.count || 0; })) || 1;

      var container = el('div', { className: 'h-bars' });
      arr.slice(0, 20).forEach(function(item) {
        container.appendChild(el('div', { className: 'h-bar-row' },
          el('span', { className: 'h-bar-label' }, truncate(String(item[labelKey] || ''), 30)),
          el('div', { className: 'h-bar-track' },
            el('div', { className: 'h-bar-fill', style: { width: (item.count / maxCount * 100) + '%' } })
          ),
          el('span', { className: 'h-bar-value' }, String(item.count))
        ));
      });
      if (arr.length > 20) {
        container.appendChild(el('div', {
          style: { fontSize: '11px', color: 'var(--text-tertiary)', marginTop: '4px' }
        }, '+ ' + (arr.length - 20) + ' more'));
      }
      return container;
    }

    /** Render array of objects as a table with expandable timeline rows */
    function renderAutoTable(arr) {
      /* collect all unique keys */
      var keysSet = {};
      arr.forEach(function(obj) { Object.keys(obj).forEach(function(k) { keysSet[k] = true; }); });
      var allKeys = Object.keys(keysSet);

      /* too many columns → fall back to JSON */
      if (allKeys.length > 14) {
        return el('pre', { className: 'json-raw' }, JSON.stringify(arr, null, 2));
      }

      var hasTimeline = allKeys.includes('timeline');
      var displayKeys = allKeys.filter(function(k) { return k !== 'timeline'; });

      var table = el('table', { className: 'data-table' });
      var headerRow = el('tr');
      displayKeys.forEach(function(k) {
        headerRow.appendChild(el('th', { className: typeof arr[0][k] === 'number' ? 'num' : '' }, k));
      });
      table.appendChild(el('thead', {}, headerRow));

      var tbody = el('tbody');
      arr.forEach(function(obj) {
        var row = el('tr', { style: { cursor: hasTimeline && obj.timeline ? 'pointer' : 'default' } });
        displayKeys.forEach(function(k) {
          var val = obj[k];
          var isNum = typeof val === 'number';
          var isArr = Array.isArray(val);
          var isObj = typeof val === 'object' && val !== null && !isArr;
          var display;
          if (val == null) display = '\u2014';
          else if (isNum) display = fmtNum(val);
          else if (isArr) display = '[' + val.length + ']';
          else if (isObj) display = '{...}';
          else display = truncate(String(val), 40);
          row.appendChild(el('td', { className: isNum ? 'num' : '' }, display));
        });
        tbody.appendChild(row);

        /* expandable timeline sub-row */
        if (hasTimeline && obj.timeline && Array.isArray(obj.timeline) && obj.timeline.length > 0) {
          var tlRow = el('tr', { style: { display: 'none' } });
          var tlCell = el('td', { colspan: String(displayKeys.length) });
          tlCell.appendChild(renderInlineTimeline(obj.timeline));
          tlRow.appendChild(tlCell);
          row.addEventListener('click', function() {
            tlRow.style.display = tlRow.style.display === 'none' ? '' : 'none';
          });
          tbody.appendChild(tlRow);
        }
      });

      table.appendChild(tbody);

      var container = el('div');
      container.appendChild(el('div', {
        style: { fontSize: '11px', color: 'var(--text-tertiary)', marginBottom: '4px' }
      }, arr.length + ' items' + (hasTimeline ? ' \u00B7 click row to expand timeline' : '')));
      container.appendChild(table);
      return container;
    }

    /** Render a plain object as key-value pairs with auto-rendered values */
    function renderAutoObject(obj) {
      var container = el('div');
      var keys = Object.keys(obj);

      keys.forEach(function(k) {
        var val = obj[k];
        var row = el('div', { style: { marginBottom: '6px' } });

        row.appendChild(el('span', {
          style: { fontFamily: 'var(--font-mono)', color: 'var(--accent)', fontSize: '12px', fontWeight: '500' }
        }, k + ': '));

        if (typeof val === 'string' && val.length <= 100) {
          row.appendChild(el('span', { style: { color: 'var(--text-secondary)' } }, val));
        } else if (typeof val === 'number' || typeof val === 'boolean') {
          row.appendChild(el('span', { style: { fontFamily: 'var(--font-mono)', color: 'var(--text-primary)' } }, String(val)));
        } else if (val != null) {
          row.appendChild(el('div', { style: { marginTop: '4px', marginLeft: '12px' } }, renderAutoValue(val)));
        } else {
          row.appendChild(el('span', { style: { color: 'var(--text-tertiary)' } }, '\u2014'));
        }

        container.appendChild(row);
      });

      return container;
    }

    /* ==========================================================
     *  getMultipleVideoDetails RENDERER
     * ========================================================== */

    function renderVideoDetails(result, totalTokens) {
      var container = el('div');

      if (!result.videos) {
        container.appendChild(el('pre', { className: 'json-raw' }, JSON.stringify(result, null, 2)));
        return container;
      }

      /* cascade info bar */
      var cascadeInfo = el('div', { className: 'cascade-info' });
      if (result.quotaUsed != null) {
        cascadeInfo.appendChild(el('span', { className: 'cascade-badge cascade-api' },
          'YouTube API: ' + result.quotaUsed + ' unit' + (result.quotaUsed !== 1 ? 's' : '')));
      } else {
        cascadeInfo.appendChild(el('span', { className: 'cascade-badge cascade-cache' },
          'Firestore only (0 API cost)'));
      }
      cascadeInfo.appendChild(el('span', { style: { color: 'var(--text-tertiary)', fontSize: '12px' } },
        result.videos.length + ' video' + (result.videos.length !== 1 ? 's' : '') +
        (result.notFound && result.notFound.length > 0 ? ' \u00B7 ' + result.notFound.length + ' not found' : '')));
      container.appendChild(cascadeInfo);

      /* video cards */
      result.videos.forEach(function(video) {
        var card = el('div', { className: 'video-card' });

        /* header: thumbnail + title + channel */
        var header = el('div', { className: 'video-card-header' });
        if (video.thumbnailUrl) {
          header.appendChild(el('img', {
            className: 'video-thumb',
            src: video.thumbnailUrl,
            alt: ''
          }));
        }

        var info = el('div', { className: 'video-info' });

        /* title → YouTube link */
        var ytId = video.youtubeVideoId || video.videoId;
        info.appendChild(el('a', {
          className: 'video-title',
          href: 'https://www.youtube.com/watch?v=' + ytId,
          target: '_blank'
        }, video.title || video.videoId));

        /* channel + ownership badge + videoId */
        var channelRow = el('div', { className: 'video-channel-row' });
        if (video.channelTitle) {
          channelRow.appendChild(el('span', { className: 'video-channel' }, video.channelTitle));
        }
        channelRow.appendChild(el('span', {
          className: 'ownership-badge ownership-' + (video.ownership || 'external')
        }, video.ownership || 'unknown'));
        channelRow.appendChild(el('span', {
          style: { fontFamily: 'var(--font-mono)', fontSize: '10px', color: 'var(--text-tertiary)' }
        }, video.videoId));
        info.appendChild(channelRow);

        header.appendChild(info);
        card.appendChild(header);

        /* metrics row */
        var metrics = el('div', { className: 'video-metrics' });
        if (video.viewCount != null) metrics.appendChild(metricPill('views', fmtNum(Number(video.viewCount))));
        if (video.likeCount != null) metrics.appendChild(metricPill('likes', fmtNum(Number(video.likeCount))));
        if (video.commentCount != null) metrics.appendChild(metricPill('comments', fmtNum(Number(video.commentCount))));
        if (video.duration) metrics.appendChild(metricPill('duration', parseDuration(video.duration)));
        if (video.publishedAt) metrics.appendChild(metricPill('published', formatDate(video.publishedAt)));
        card.appendChild(metrics);

        /* view deltas */
        var hasDeltas = video.viewDelta24h !== undefined || video.viewDelta7d !== undefined || video.viewDelta30d !== undefined;
        if (hasDeltas) {
          var deltas = el('div', { className: 'video-deltas' });
          deltas.appendChild(el('span', { className: 'deltas-label' }, 'View deltas:'));
          [['24h', video.viewDelta24h], ['7d', video.viewDelta7d], ['30d', video.viewDelta30d]].forEach(function(pair) {
            deltas.appendChild(el('span', { className: 'delta-pill ' + deltaClass(pair[1]) },
              pair[0] + ': ' + fmtDelta(pair[1])));
          });
          card.appendChild(deltas);
        }

        /* traffic snapshot counts (own videos) */
        if (video.suggestedTrafficSnapshotCount != null || video.trafficSourceSnapshotCount != null) {
          var snapshots = el('div', { className: 'video-snapshots' });
          if (video.suggestedTrafficSnapshotCount != null) {
            snapshots.appendChild(el('span', { className: 'snapshot-pill' },
              'Suggested snapshots: ' + video.suggestedTrafficSnapshotCount));
          }
          if (video.trafficSourceSnapshotCount != null) {
            snapshots.appendChild(el('span', { className: 'snapshot-pill' },
              'Traffic source snapshots: ' + video.trafficSourceSnapshotCount));
          }
          card.appendChild(snapshots);
        }

        /* tags */
        if (video.tags && video.tags.length > 0) {
          var pills = el('div', { className: 'tag-pills video-tags' });
          video.tags.forEach(function(tag) {
            pills.appendChild(el('span', { className: 'tag-pill' }, tag));
          });
          card.appendChild(pills);
        }

        /* description (truncated, expandable) */
        if (video.description) {
          var descSection = el('div', { className: 'video-desc' });
          var shortDesc = truncate(video.description, 150);
          var descText = el('div', {
            style: { color: 'var(--text-tertiary)', fontSize: '12px', whiteSpace: 'pre-wrap', lineHeight: '1.5' }
          }, shortDesc);
          descSection.appendChild(descText);

          if (video.description.length > 150) {
            var expanded = false;
            var moreBtn = el('span', {
              style: { color: 'var(--accent)', cursor: 'pointer', fontSize: '11px', marginLeft: '4px' }
            }, 'show more');
            moreBtn.addEventListener('click', function() {
              expanded = !expanded;
              descText.textContent = expanded ? video.description : shortDesc;
              moreBtn.textContent = expanded ? 'show less' : 'show more';
            });
            descSection.appendChild(moreBtn);
          }
          card.appendChild(descSection);
        }

        /* thumbnailDescription */
        if (video.thumbnailDescription) {
          card.appendChild(el('div', { className: 'thumb-desc' },
            '\uD83D\uDDBC ' + video.thumbnailDescription));
        }

        /* youtubeVideoId for custom videos */
        if (video.youtubeVideoId) {
          card.appendChild(el('div', {
            style: { fontSize: '11px', color: 'var(--text-tertiary)', marginTop: '6px', fontFamily: 'var(--font-mono)' }
          }, 'youtubeVideoId: ' + video.youtubeVideoId + ' (custom video)'));
        }

        container.appendChild(card);
      });

      /* notFound */
      if (result.notFound && result.notFound.length > 0) {
        var nf = el('div', { className: 'not-found-section' });
        nf.appendChild(el('div', {
          style: { color: 'var(--warning)', fontSize: '12px', fontWeight: '500', marginBottom: '6px' }
        }, 'Not Found (' + result.notFound.length + ')'));
        var nfPills = el('div', { className: 'tag-pills' });
        result.notFound.forEach(function(id) {
          nfPills.appendChild(el('span', {
            className: 'tag-pill',
            style: { background: 'var(--danger-dim)', color: 'var(--danger)' }
          }, id));
        });
        nf.appendChild(nfPills);
        container.appendChild(nf);
      }

      /* notFoundTitles */
      if (result.notFoundTitles && result.notFoundTitles.length > 0) {
        var nft = el('div', { className: 'not-found-section' });
        nft.appendChild(el('div', {
          style: { color: 'var(--warning)', fontSize: '12px', fontWeight: '500', marginBottom: '6px' }
        }, 'Not Found Titles (' + result.notFoundTitles.length + ')'));
        var nftPills = el('div', { className: 'tag-pills' });
        result.notFoundTitles.forEach(function(title) {
          nftPills.appendChild(el('span', {
            className: 'tag-pill',
            style: { background: 'var(--danger-dim)', color: 'var(--danger)' }
          }, title));
        });
        nft.appendChild(nftPills);
        container.appendChild(nft);
      }

      return container;
    }

    /* ==========================================================
     *  viewThumbnails renderer
     * ========================================================== */

    function renderViewThumbnails(result, totalTokens) {
      var container = el('div');

      if (!result.videos || !result.videos.length) {
        container.appendChild(el('div', { style: { color: 'var(--text-tertiary)', fontSize: '13px' } },
          'No thumbnails found'));
        return container;
      }

      /* summary line */
      var summary = result.videos.length + ' thumbnail' + (result.videos.length !== 1 ? 's' : '');
      if (result.notFound && result.notFound.length > 0) {
        summary += ' \u00B7 ' + result.notFound.length + ' not found';
      }
      if (result.notFoundTitles && result.notFoundTitles.length > 0) {
        summary += ' \u00B7 ' + result.notFoundTitles.length + ' title' + (result.notFoundTitles.length !== 1 ? 's' : '') + ' not found';
      }
      container.appendChild(el('div', {
        style: { color: 'var(--text-tertiary)', fontSize: '12px', marginBottom: '8px' }
      }, summary));

      /* thumbnail grid */
      var grid = el('div', { className: 'thumb-grid' });
      result.videos.forEach(function(video) {
        var item = el('div', { className: 'thumb-grid-item' });

        if (video.thumbnailUrl) {
          item.appendChild(el('img', { src: video.thumbnailUrl, alt: video.title || '' }));
        }

        var caption = el('div', { className: 'thumb-grid-caption' });
        caption.appendChild(el('a', {
          className: 'thumb-grid-title',
          href: 'https://www.youtube.com/watch?v=' + video.videoId,
          target: '_blank'
        }, video.title || video.videoId));
        caption.appendChild(el('div', { className: 'thumb-grid-id' }, video.videoId));
        item.appendChild(caption);

        grid.appendChild(item);
      });
      container.appendChild(grid);

      /* notFound — only when non-empty */
      if (result.notFound && result.notFound.length > 0) {
        var nf = el('div', { style: { marginTop: '10px' } });
        nf.appendChild(el('div', {
          style: { color: 'var(--warning)', fontSize: '12px', fontWeight: '500', marginBottom: '4px' }
        }, 'Not Found (' + result.notFound.length + ')'));
        var nfPills = el('div', { className: 'tag-pills' });
        result.notFound.forEach(function(id) {
          nfPills.appendChild(el('span', {
            className: 'tag-pill',
            style: { background: 'var(--danger-dim)', color: 'var(--danger)' }
          }, id));
        });
        nf.appendChild(nfPills);
        container.appendChild(nf);
      }

      /* notFoundTitles — only when non-empty */
      if (result.notFoundTitles && result.notFoundTitles.length > 0) {
        var nft = el('div', { style: { marginTop: '10px' } });
        nft.appendChild(el('div', {
          style: { color: 'var(--warning)', fontSize: '12px', fontWeight: '500', marginBottom: '4px' }
        }, 'Not Found Titles (' + result.notFoundTitles.length + ')'));
        var nftPills = el('div', { className: 'tag-pills' });
        result.notFoundTitles.forEach(function(title) {
          nftPills.appendChild(el('span', {
            className: 'tag-pill',
            style: { background: 'var(--danger-dim)', color: 'var(--danger)' }
          }, title));
        });
        nft.appendChild(nftPills);
        container.appendChild(nft);
      }

      return container;
    }

    /* ==========================================================
     *  getVideoComments RENDERER
     * ========================================================== */

    function renderVideoComments(result, totalTokens) {
      var container = el('div');

      if (result.error) {
        container.appendChild(el('div', {
          style: { color: 'var(--danger)', fontSize: '13px', padding: '8px 12px', background: 'var(--danger-dim)', borderRadius: 'var(--radius-sm)' }
        }, result.error));
        return container;
      }

      /* summary bar */
      var summary = el('div', { className: 'comments-summary' });
      var left = el('div', { className: 'comments-summary-left' });

      var ytLink = el('a', {
        href: 'https://www.youtube.com/watch?v=' + result.videoId,
        target: '_blank',
        style: { color: 'var(--accent)', textDecoration: 'none', fontSize: '12px' }
      }, result.videoId);
      left.appendChild(ytLink);

      var coveragePct = result.coveragePercent || 0;
      var coverageText = (result.fetchedCount || 0) + ' / ' + (result.totalTopLevelThreads || 0) + ' threads (' + coveragePct + '%)';
      left.appendChild(el('span', { style: { color: 'var(--text-secondary)' } }, coverageText));

      var coverageBar = el('span', { className: 'coverage-bar' },
        el('span', { className: 'coverage-bar-fill', style: { width: Math.min(coveragePct, 100) + '%' } })
      );
      left.appendChild(coverageBar);
      summary.appendChild(left);

      var right = el('div', { className: 'comments-summary-right' });
      right.appendChild(el('span', { className: 'cascade-badge cascade-api' },
        (result.quotaUsed || 0) + ' quota unit' + ((result.quotaUsed || 0) !== 1 ? 's' : '')));
      if (result.hasMore) {
        right.appendChild(el('span', { style: { color: 'var(--warning)', fontSize: '11px' } }, 'has more pages'));
      }
      summary.appendChild(right);
      container.appendChild(summary);

      /* comments list */
      var comments = result.comments || [];
      if (comments.length === 0) {
        container.appendChild(el('div', { style: { color: 'var(--text-tertiary)', fontSize: '13px', padding: '12px' } }, 'No comments'));
        return container;
      }

      /* compute stats for token budget sections */
      var totalReplies = 0;
      var withReplies = 0;
      var maxLikes = 0;
      comments.forEach(function(c) {
        totalReplies += (c.replyCount || 0);
        if (c.replyCount > 0) withReplies++;
        if (c.likeCount > maxLikes) maxLikes = c.likeCount;
      });

      /* quick stats row */
      var stats = el('div', { style: { display: 'flex', gap: '12px', marginBottom: '12px', flexWrap: 'wrap' } });
      stats.appendChild(metricPill('top-level', String(comments.length)));
      stats.appendChild(metricPill('total replies', String(totalReplies)));
      stats.appendChild(metricPill('threads with replies', withReplies + ' (' + (comments.length > 0 ? Math.round(withReplies / comments.length * 100) : 0) + '%)'));
      stats.appendChild(metricPill('max likes', String(maxLikes)));
      container.appendChild(stats);

      /* each comment card */
      comments.forEach(function(comment) {
        var card = el('div', { className: 'comment-card' });

        /* header: author + date */
        var header = el('div', { className: 'comment-header' });
        header.appendChild(el('span', { className: 'comment-author' }, comment.author || 'Unknown'));
        header.appendChild(el('span', { className: 'comment-date' }, formatDate(comment.publishedAt)));
        card.appendChild(header);

        /* text (expandable if > 200 chars) */
        var text = comment.text || '';
        var shortText = text.length > 200 ? text.slice(0, 200) + '\u2026' : text;
        var textEl = el('div', { className: 'comment-text' }, shortText);
        card.appendChild(textEl);

        if (text.length > 200) {
          var expanded = false;
          var moreBtn = el('span', {
            style: { color: 'var(--accent)', cursor: 'pointer', fontSize: '11px' }
          }, 'show more');
          moreBtn.addEventListener('click', function() {
            expanded = !expanded;
            textEl.textContent = expanded ? text : shortText;
            moreBtn.textContent = expanded ? 'show less' : 'show more';
          });
          card.appendChild(moreBtn);
        }

        /* metrics: likes + replies */
        var metrics = el('div', { className: 'comment-metrics' });
        metrics.appendChild(el('span', { className: comment.likeCount > 0 ? 'comment-metric-active' : '' },
          '\u2764 ' + (comment.likeCount || 0)));
        metrics.appendChild(el('span', { className: comment.replyCount > 0 ? 'comment-metric-active' : '' },
          '\u21A9 ' + (comment.replyCount || 0) + ' repl' + (comment.replyCount === 1 ? 'y' : 'ies')));
        if (comment.authorChannelId) {
          metrics.appendChild(el('span', {}, comment.authorChannelId.slice(0, 10) + '\u2026'));
        }
        card.appendChild(metrics);

        /* topReplies — nested thread */
        if (comment.topReplies && comment.topReplies.length > 0) {
          var repliesContainer = el('div', { className: 'comment-replies' });

          comment.topReplies.forEach(function(reply) {
            var replyCard = el('div', { className: 'reply-card' });

            replyCard.appendChild(el('span', { className: 'reply-author' }, reply.author || 'Unknown'));
            replyCard.appendChild(el('div', { className: 'reply-text' }, reply.text || ''));

            var replyMeta = el('div', { className: 'reply-meta' });
            if (reply.likeCount > 0) {
              replyMeta.appendChild(el('span', {}, '\u2764 ' + reply.likeCount));
            }
            replyMeta.appendChild(el('span', {}, formatDate(reply.publishedAt)));
            replyCard.appendChild(replyMeta);

            repliesContainer.appendChild(replyCard);
          });

          /* indicator if more replies exist than returned */
          if (comment.replyCount > comment.topReplies.length) {
            repliesContainer.appendChild(el('div', {
              style: { fontSize: '10px', color: 'var(--text-tertiary)', fontStyle: 'italic', paddingTop: '4px' }
            }, '+ ' + (comment.replyCount - comment.topReplies.length) + ' more repl' +
              ((comment.replyCount - comment.topReplies.length) === 1 ? 'y' : 'ies') + ' (not fetched)'));
          }

          card.appendChild(repliesContainer);
        }

        container.appendChild(card);
      });

      /* _systemNote */
      if (result._systemNote) {
        container.appendChild(el('div', {
          style: {
            marginTop: '12px', padding: '8px 12px', background: 'var(--warning-dim)',
            borderRadius: 'var(--radius-sm)', fontSize: '11px', color: 'var(--warning)',
            fontFamily: 'var(--font-mono)', whiteSpace: 'pre-wrap'
          }
        }, '_systemNote: ' + result._systemNote));
      }

      return container;
    }

    /* ==========================================================
     *  saveKnowledge RENDERER (args-centric)
     * ========================================================== */

    function renderSaveKnowledge(result, totalTokens, args) {
      var container = el('div');

      /* result confirmation */
      if (result && result.id) {
        var confirmBar = el('div', {
          style: {
            display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 12px',
            background: result.skipped ? 'var(--warning-dim)' : 'var(--success-dim)',
            borderRadius: 'var(--radius-sm)', marginBottom: '12px', fontSize: '12px',
            fontFamily: 'var(--font-mono)'
          }
        });
        confirmBar.appendChild(el('span', {
          style: { color: result.skipped ? 'var(--warning)' : 'var(--success)' }
        }, result.skipped ? 'Skipped (duplicate)' : 'Saved'));
        confirmBar.appendChild(el('span', { style: { color: 'var(--text-tertiary)' } }, 'id: ' + result.id));
        container.appendChild(confirmBar);
      }

      if (!args) {
        container.appendChild(el('pre', { className: 'json-raw' }, JSON.stringify(result, null, 2)));
        return container;
      }

      /* KI card from args */
      var card = el('div', { className: 'ki-card' });

      /* header: title + category */
      var header = el('div', { className: 'ki-header' });
      header.appendChild(el('span', { className: 'ki-title' }, args.title || 'Untitled'));
      if (args.category) header.appendChild(el('span', { className: 'ki-category' }, args.category));
      card.appendChild(header);

      /* meta pills */
      var meta = el('div', { className: 'ki-meta' });
      if (args.videoId) meta.appendChild(metricPill('videoId', args.videoId));
      if (args.toolsUsed && args.toolsUsed.length) {
        args.toolsUsed.forEach(function(t) {
          meta.appendChild(el('span', { className: 'tag-pill' }, t));
        });
      }
      if (args.videoRefs && args.videoRefs.length) {
        meta.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)' } },
          args.videoRefs.length + ' video ref' + (args.videoRefs.length !== 1 ? 's' : '')));
      }
      card.appendChild(meta);

      /* summary */
      if (args.summary) {
        card.appendChild(el('div', { className: 'ki-summary' }, args.summary));
      }

      /* content — markdown rendered */
      if (args.content) {
        var contentDiv = el('div', { className: 'ki-content' });
        if (typeof marked !== 'undefined' && marked.parse) {
          contentDiv.innerHTML = marked.parse(args.content);
        } else {
          contentDiv.appendChild(el('pre', { style: { whiteSpace: 'pre-wrap', color: 'var(--text-secondary)' } }, args.content));
        }
        card.appendChild(contentDiv);
      }

      /* videoRefs as pills */
      if (args.videoRefs && args.videoRefs.length) {
        var refsDiv = el('div', { style: { padding: '8px 14px', borderTop: '1px solid var(--border)' } });
        refsDiv.appendChild(el('div', {
          style: { fontSize: '11px', color: 'var(--text-tertiary)', marginBottom: '4px', fontWeight: '500' }
        }, 'Video References'));
        var pills = el('div', { className: 'tag-pills' });
        args.videoRefs.forEach(function(id) {
          var link = el('a', {
            className: 'tag-pill',
            href: 'https://www.youtube.com/watch?v=' + id,
            target: '_blank',
            style: { textDecoration: 'none' }
          }, id);
          pills.appendChild(link);
        });
        refsDiv.appendChild(pills);
        card.appendChild(refsDiv);
      }

      container.appendChild(card);
      return container;
    }

    /* ==========================================================
     *  getKnowledge RENDERER
     * ========================================================== */

    function renderGetKnowledge(result, totalTokens, args) {
      var container = el('div');

      container.appendChild(el('div', {
        style: { fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '10px' }
      }, (result.count || 0) + ' Knowledge Item' + ((result.count || 0) !== 1 ? 's' : '') + ' retrieved'));

      /* parse content — it's a JSON string with full items */
      var items = [];
      if (result.content) {
        try { items = JSON.parse(result.content); } catch(e) { /* not JSON, show as-is */ }
      }

      if (Array.isArray(items) && items.length > 0) {
        items.forEach(function(item) {
          var card = el('div', { className: 'ki-card', style: { marginBottom: '12px' } });

          var header = el('div', { className: 'ki-header' });
          header.appendChild(el('span', { className: 'ki-title' }, item.title || 'Untitled'));
          if (item.category) header.appendChild(el('span', { className: 'ki-category' }, item.category));
          card.appendChild(header);

          if (item.summary) {
            card.appendChild(el('div', { className: 'ki-summary' }, item.summary));
          }

          if (item.content) {
            var contentDiv = el('div', { className: 'ki-content' });
            if (typeof marked !== 'undefined' && marked.parse) {
              contentDiv.innerHTML = marked.parse(item.content);
            } else {
              contentDiv.appendChild(el('pre', { style: { whiteSpace: 'pre-wrap' } }, item.content));
            }
            card.appendChild(contentDiv);
          }

          container.appendChild(card);
        });
      } else if (result.content && !items.length) {
        /* content wasn't parseable as JSON array — show as raw markdown */
        var contentDiv = el('div', { className: 'ki-content' });
        if (typeof marked !== 'undefined' && marked.parse) {
          contentDiv.innerHTML = marked.parse(result.content);
        } else {
          contentDiv.appendChild(el('pre', { className: 'json-raw' }, result.content));
        }
        container.appendChild(contentDiv);
      }

      /* lightweight items list from result.items */
      if (result.items && result.items.length && (!items || !items.length)) {
        result.items.forEach(function(item) {
          container.appendChild(el('div', { style: { padding: '6px 0', borderBottom: '1px solid var(--border)', fontSize: '12px' } },
            el('span', { className: 'ki-category', style: { marginRight: '8px' } }, item.category || ''),
            el('span', { style: { fontWeight: '500' } }, item.title || item.id),
            item.videoId ? el('span', { style: { color: 'var(--text-tertiary)', marginLeft: '8px', fontFamily: 'var(--font-mono)', fontSize: '10px' } }, item.videoId) : el('span')
          ));
        });
      }

      return container;
    }

    /* ==========================================================

    function renderAppContextCards(appContext) {

        if (ctx.ownership) metaLine.push(ctx.ownership);

        section.appendChild(card);
      });

    /* ==========================================================
     *  Helper: render thinking block
     * ========================================================== */

    function renderThinkingBlock(thinking, elapsedMs) {
      var block = el('div', { className: 'thinking-block' });
      var timeStr = elapsedMs ? (elapsedMs / 1000).toFixed(1) + 's' : '';

      var header = el('div', { className: 'thinking-header' },

        el('span', { style: { color: 'var(--text-tertiary)', fontSize: '11px', fontFamily: 'var(--font-mono)' } },

    /* ==========================================================
     *  Helper: render iteration details table
     * ========================================================== */

    function renderIterationDetails(iterationDetails, billing) {
      var container = el('div');

      if (billing && billing.cost) {
        var summaryRow = el('div', {
          style: { display: 'flex', gap: '12px', flexWrap: 'wrap', marginBottom: '8px' }
        });
        summaryRow.appendChild(metricPill('total cost', fmtCost(billing.cost.total)));
        summaryRow.appendChild(metricPill('iterations', String(billing.iterations || iterationDetails.length)));
        summaryRow.appendChild(metricPill('input tokens', fmtNum(billing.input ? billing.input.total : 0)));
        summaryRow.appendChild(metricPill('output tokens', fmtNum(billing.output ? billing.output.total : 0)));
        if (billing.input && billing.input.cached) {
          summaryRow.appendChild(metricPill('cached', fmtNum(billing.input.cached)));
        }
        if (billing.cost.withoutCache != null) {
          summaryRow.appendChild(metricPill('without cache', fmtCost(billing.cost.withoutCache)));
        }
        container.appendChild(summaryRow);
      }

      if (!iterationDetails || !iterationDetails.length) return container;

      var table = el('table', { className: 'iteration-table' });
      table.appendChild(el('thead', {},
        el('tr', {},
          el('th', {}, '#'),
          el('th', {}, 'Input'),
          el('th', {}, 'Cached'),
          el('th', {}, 'CacheWrite'),
          el('th', {}, 'Output'),
          el('th', {}, 'Thinking'),
          el('th', {}, 'Cost')
        )
      ));

      var tbody = el('tbody');
      iterationDetails.forEach(function(iter, i) {
        var inp = iter.input || {};
        var out = iter.output || {};
        var cost = iter.cost || {};
        tbody.appendChild(el('tr', {},
          el('td', {}, String(i + 1)),
          el('td', {}, fmtNum(inp.total || 0)),
          el('td', {}, fmtNum(inp.cached || 0)),
          el('td', {}, fmtNum(inp.cacheWrite || 0)),
          el('td', {}, fmtNum(out.total || 0)),
          el('td', {}, fmtNum(out.thinking || 0)),
          el('td', {}, fmtCost(cost.total))
        ));
      });
      table.appendChild(tbody);
      container.appendChild(table);
      return container;
    }

    /* ==========================================================
     *  MAIN RENDER
     * ========================================================== */

    var TOOL_RENDERERS = {
      'analyzeTrafficSources': renderTrafficSources,
      'analyzeSuggestedTraffic': renderSuggestedTraffic,
      'getMultipleVideoDetails': renderVideoDetails,
      'viewThumbnails': renderViewThumbnails,
      'getVideoComments': renderVideoComments,
      'mentionVideo': renderMentionVideo,
      'saveKnowledge': renderSaveKnowledge,
      'getKnowledge': renderGetKnowledge,
      'listKnowledge': renderListKnowledge,
      'editKnowledge': renderEditKnowledge,
      'saveMemory': renderSaveMemory
    };

    function renderTrace(trace) {
      var meta = trace.meta || {};
      var conversation = trace.conversation || {};
      var messages = trace.messages || [];

      var modelMessages = [];
      messages.forEach(function(m) {
        if (m.role === 'model') modelMessages.push(m);
      });
      var lastModelMsg = modelMessages[modelMessages.length - 1] || null;

      /* store messages globally for meta aggregation */
      document.traceMessages = messages;

      /* meta bar */
      renderMeta(meta, lastModelMsg, conversation);

      /* persisted context bar */
      var persistedBar = document.getElementById('persisted-context-bar');
      persistedBar.innerHTML = '';
      persistedBar.style.display = 'none';
      if (conversation.persistedContext && conversation.persistedContext.length > 0) {
        persistedBar.style.display = '';
        persistedBar.appendChild(el('div', { className: 'persisted-label' }, 'Pinned Context (' + conversation.persistedContext.length + ')'));
        var cards = el('div', { className: 'persisted-cards' });
        conversation.persistedContext.forEach(function(ctx) {
          var card = el('div', { className: 'app-context-card' });
          if (ctx.thumbnailUrl) {
            card.appendChild(el('img', { className: 'app-context-thumb', src: ctx.thumbnailUrl, alt: '' }));
          }
          var info = el('div', { className: 'app-context-info' });
          info.appendChild(el('div', { className: 'app-context-title' }, ctx.title || ctx.videoId || '\u2014'));
          var metaLine = [];
          if (ctx.channelTitle) metaLine.push(ctx.channelTitle);
          if (ctx.ownership) metaLine.push(ctx.ownership);
          if (ctx.viewCount) metaLine.push(fmtNum(Number(ctx.viewCount)) + ' views');
          info.appendChild(el('div', { className: 'app-context-meta' }, metaLine.join(' \u00B7 ')));
          card.appendChild(info);
          cards.appendChild(card);
        });
        persistedBar.appendChild(cards);
      }

      /* context breakdown — scale chars → tokens, pick the richest one */
      var breakdownSection = document.getElementById('context-breakdown-section');
      breakdownSection.innerHTML = '';
      var breakdownMsg = null;
      modelMessages.forEach(function(m) {
        if (m.contextBreakdown) breakdownMsg = m;
      });
      if (breakdownMsg && breakdownMsg.contextBreakdown) {
        var inputTokens = breakdownMsg.normalizedUsage &&
          breakdownMsg.normalizedUsage.contextWindow &&
          breakdownMsg.normalizedUsage.contextWindow.inputTokens;
        var scaledBreakdown = inputTokens
          ? scaleBreakdown(breakdownMsg.contextBreakdown, inputTokens)
          : breakdownMsg.contextBreakdown;

        breakdownSection.appendChild(el('div', {
          style: { fontSize: '11px', color: 'var(--text-tertiary)', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: '600' }
        }, 'Context Breakdown (estimated tokens)'));
        breakdownSection.appendChild(renderContextBreakdown(scaledBreakdown));

        /* iteration details — collapsible */
        if (breakdownMsg.normalizedUsage) {
          var nu = breakdownMsg.normalizedUsage;
          if (nu.iterationDetails || nu.billing) {
            var iterSection = el('div', { style: { marginTop: '10px' } });
            var iterHeader = el('div', {
              style: { fontSize: '11px', color: 'var(--text-tertiary)', cursor: 'pointer', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: '600' }
            }, '\u25B6 Iteration Details (' + (nu.billing && nu.billing.iterations || (nu.iterationDetails && nu.iterationDetails.length) || '?') + ' iterations)');
            var iterBody = el('div', { style: { display: 'none' } });
            iterBody.appendChild(renderIterationDetails(nu.iterationDetails, nu.billing));
            iterHeader.addEventListener('click', function() {
              var open = iterBody.style.display !== 'none';
              iterBody.style.display = open ? 'none' : 'block';
              iterHeader.textContent = (open ? '\u25B6' : '\u25BC') + ' Iteration Details (' + (nu.billing && nu.billing.iterations || (nu.iterationDetails && nu.iterationDetails.length) || '?') + ' iterations)';
            });
            iterSection.appendChild(iterHeader);
            iterSection.appendChild(iterBody);
            breakdownSection.appendChild(iterSection);
          }
        }
      }

      /* tools panel — render ALL messages in conversation order */
      var toolsPanel = document.getElementById('tools-panel');
      toolsPanel.innerHTML = '';

      messages.forEach(function(msg) {
        if (msg.role === 'user') {
          var userBlock = el('div', {
            style: {
              padding: '10px 16px', background: 'var(--bg-card)', borderRadius: 'var(--radius)',
              marginBottom: '16px', borderLeft: '3px solid var(--accent)'
            }
          });
          userBlock.appendChild(el('div', {
            style: { fontSize: '11px', color: 'var(--text-tertiary)', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '1px' }
          }, 'User Message'));
          userBlock.appendChild(el('div', { style: { color: 'var(--text-secondary)' } }, msg.text || ''));

          /* appContext video cards */
          if (msg.appContext && msg.appContext.length > 0) {
            userBlock.appendChild(renderAppContextCards(msg.appContext));
          }

          toolsPanel.appendChild(userBlock);
        } else if (msg.role === 'model') {
          /* thinking block */
          if (msg.thinking) {
            toolsPanel.appendChild(renderThinkingBlock(msg.thinking, msg.thinkingElapsedMs));
          }

          /* tool calls */
          if (msg.toolCalls) {
            msg.toolCalls.forEach(function(tc) {
              var resultTokens = estimateTokens(tc.result);
              var argsTokens = estimateTokens(tc.args);
              var totalTokens = resultTokens + argsTokens;
              var card = el('div', { className: 'tool-card' });

              var chevron = el('span', { style: { fontSize: '10px', color: 'var(--text-tertiary)' } }, '\u25BC');
              var header = el('div', { className: 'tool-header' },
                chevron,
                el('span', { className: 'tool-name' }, tc.name),
                el('span', { className: 'tool-tokens' },
                  'result ~' + fmtNum(resultTokens) + ' tok' +
                  (argsTokens > 100 ? ' \u00B7 args ~' + fmtNum(argsTokens) + ' tok' : ''))
              );

              /* args row — truncate huge args (e.g. saveKnowledge content) */
              var argsStr = JSON.stringify(tc.args);
              var argsDisplay = argsStr.length > 300 ? argsStr.slice(0, 300) + '\u2026' : argsStr;
              var argsRow = el('div', { className: 'tool-args' },
                el('span', { style: { color: 'var(--text-tertiary)' } }, 'args: '),
                argsDisplay
              );

              var body = el('div', { className: 'tool-body' });
              var renderer = TOOL_RENDERERS[tc.name];
              if (renderer) {
                body.appendChild(renderer(tc.result, totalTokens, tc.args));
              } else {
                body.appendChild(renderGenericResult(tc.result, totalTokens));
              }

              var bodyVisible = true;
              header.addEventListener('click', function() {
                bodyVisible = !bodyVisible;
                body.style.display = bodyVisible ? '' : 'none';
                argsRow.style.display = bodyVisible ? '' : 'none';
                chevron.textContent = bodyVisible ? '\u25BC' : '\u25B6';
              });

              card.appendChild(header);
              card.appendChild(argsRow);
              card.appendChild(body);
              toolsPanel.appendChild(card);
            });
          }
        }
      });

      /* model responses — render ALL in separate cards */
      var responsePanel = document.getElementById('response-panel');
      responsePanel.innerHTML = '';
      modelMessages.forEach(function(msg, idx) {
        var card = el('div', {
          style: {
            background: 'var(--bg-card)', border: '1px solid var(--border)',
            borderRadius: 'var(--radius)', padding: '16px', marginBottom: '16px'
          }
        });

        /* header: label + status + model + token usage */
        var headerRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' } });
        headerRow.appendChild(el('div', { className: 'response-label', style: { margin: '0' } },
          'Model Response' + (modelMessages.length > 1 ? ' #' + (idx + 1) : '')));

        if (msg.status) {
          headerRow.appendChild(el('span', {
            className: 'status-badge status-' + msg.status
          }, msg.status));
        }
        if (msg.model) {
          headerRow.appendChild(el('span', { className: 'meta-badge' },
            el('span', { className: 'value' }, msg.model)));
        }
        if (msg.tokenUsage) {
          var tu = msg.tokenUsage;
          if (tu.promptTokens) headerRow.appendChild(metricPill('in', fmtNum(tu.promptTokens)));
          if (tu.completionTokens) headerRow.appendChild(metricPill('out', fmtNum(tu.completionTokens)));
          if (tu.cachedTokens) headerRow.appendChild(metricPill('cached', fmtNum(tu.cachedTokens)));
        }
        card.appendChild(headerRow);

        /* text content */
        if (msg.text) {
          var content = el('div');
          if (typeof marked !== 'undefined' && marked.parse) {
            content.innerHTML = marked.parse(msg.text);
          } else {
            content.appendChild(el('pre', { style: { whiteSpace: 'pre-wrap', color: 'var(--text-secondary)' } }, msg.text));
          }
          card.appendChild(content);
        } else if (msg.status === 'stopped') {
          card.appendChild(el('div', { style: { color: 'var(--text-tertiary)', fontStyle: 'italic', fontSize: '13px' } }, '(no response — stopped)'));
        }

        responsePanel.appendChild(card);
      });

      /* show viewer */
      document.getElementById('upload-zone').style.display = 'none';
      document.getElementById('viewer').style.display = '';
    }

    /* ==========================================================
     *  FILE UPLOAD
     * ========================================================== */

    function handleFile(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var trace = JSON.parse(e.target.result);
          renderTrace(trace);
        } catch (err) {
          var zone = document.getElementById('upload-zone');
          zone.querySelector('p').textContent = 'Invalid JSON: ' + err.message;
          zone.querySelector('p').style.color = 'var(--danger)';
        }
      };
      reader.readAsText(file);
    }

    function init() {
      var zone = document.getElementById('upload-zone');
      var input = document.getElementById('file-input');

      zone.addEventListener('dragover', function(e) {
        e.preventDefault();
        zone.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', function() {
        zone.classList.remove('drag-over');
      });

      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });

      input.addEventListener('change', function() {
        if (input.files.length) handleFile(input.files[0]);
      });
    }

    init();
  </script>
</body>
</html>
